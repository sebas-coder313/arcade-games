<!DOCTYPE html>
<html>
<head>
<title>Super Liquid Soccer</title>
</head>

<body>

<h1>⚽ Super Liquid Soccer</h1>
<canvas id="game" width="800" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let ballX = 400;
let ballY = 200;
let dx = 4;
let dy = 3;

function game(){

ctx.clearRect(0,0,800,400);

ctx.fillStyle="green";
ctx.fillRect(0,0,800,400);

ctx.beginPath();
ctx.arc(ballX,ballY,10,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

ballX+=dx;
ballY+=dy;

if(ballX<0 || ballX>800) dx*=-1;
if(ballY<0 || ballY>400) dy*=-1;

requestAnimationFrame(game);

}

game();

</script>

</body>
</html>
